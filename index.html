<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b1220"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="小白学英语"><link rel="manifest" href="manifest.json"><title>小白学英语 V4.2</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#eef2f7;color:#0f172a}header{background:linear-gradient(135deg,#0b1220,#1d4ed8);color:white;padding:18px 16px}main{max-width:760px;margin:auto;padding:14px 14px 120px}.panel,.card{background:white;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 3px 14px #00000010}textarea,input,select{width:100%;box-sizing:border-box;font-size:16px;padding:12px;border:1px solid #cbd5e1;border-radius:12px;margin-bottom:8px}button{border:0;border-radius:12px;padding:12px;font-weight:700;font-size:15px;background:#e2e8f0}.primary{background:#2563eb;color:white}.green{background:#059669;color:white}.danger{background:#fee2e2;color:#dc2626}.row{display:flex;gap:8px;flex-wrap:wrap}.row button{flex:1}.en{font-size:21px;font-weight:800}.zh{font-size:16px;color:#334155}.tag{font-size:12px;background:#e0e7ff;color:#3730a3;padding:5px 9px;border-radius:999px}.player{position:fixed;bottom:0;left:0;right:0;background:#fffffff2;border-top:1px solid #e2e8f0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));backdrop-filter:blur(10px)}.player .inner{max-width:760px;margin:auto}.now{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}.status{padding:10px;border-radius:12px;background:#fff7ed;color:#9a3412;margin-bottom:12px}.ok{background:#ecfdf5;color:#065f46}.bad{background:#fef2f2;color:#991b1b}</style></head><body><header><h1>小白学英语</h1><p>V4.2 手机版 · 真人感美式发音 · 随身听</p></header><main><div id="status" class="status">正在检查真人语音服务……</div><section class="panel"><h3>🎧 随身听</h3><select id="scope"><option value="all">全部句子</option><option value="current">当前搜索列表</option><option value="favorite">只播收藏</option></select><select id="mode"><option value="once">播放一遍</option><option value="listLoop">列表循环</option><option value="singleLoop">单句循环</option></select><select id="repeat"><option value="1">每句1次</option><option value="3" selected>每句3次</option><option value="5">每句5次</option></select><select id="lang"><option value="en">只播英文</option><option value="enZh">英文→中文</option><option value="zhEn">中文→英文</option></select><div class="row"><button id="playAll" class="primary">▶ 开始播放</button><button id="shuffle">🔀 随机播放</button></div></section><section class="panel"><textarea id="en" placeholder="英文句子"></textarea><textarea id="zh" placeholder="中文意思"></textarea><select id="cat"><option>安装英语</option><option>浴室门</option><option>玻璃</option><option>雨棚</option><option>栏杆</option><option>收款</option><option>开车</option><option>日常英语</option><option>我的句子</option></select><select id="voice"><option value="marin">Marin（推荐）</option><option value="cedar">Cedar（推荐）</option><option value="coral">Coral</option><option value="alloy">Alloy</option></select><select id="speed"><option value="0.72">很慢0.72×</option><option value="0.82">慢速0.82×</option><option value="0.92" selected>自然0.92×</option><option value="1">正常1.0×</option></select><div class="row"><button id="preview" class="primary">▶ 真人发音</button><button id="en2zh">英文→中文</button><button id="zh2en" class="green">中文→英文</button></div><div class="row"><button id="save">保存句子</button><button id="paste">从剪贴板导入</button><button id="clear">清空</button></div></section><section class="panel"><input id="search" placeholder="搜索英文或中文"><select id="filter"><option value="all">全部</option><option value="favorite">收藏</option></select></section><div id="count"></div><section id="list"></section></main><div class="player"><div class="inner"><div id="now" class="now">尚未播放</div><div class="row"><button id="prev">⏮</button><button id="pause" class="primary">▶</button><button id="next">⏭</button><button id="stop">■</button></div><div id="progress" style="text-align:center;font-size:12px;color:#64748b;margin-top:6px">0 / 0</div></div></div><script src="config.js"></script><script>
const API=(window.APP_CONFIG?.API_BASE_URL||'').replace(/\/$/,'');const K='xiaobai_v4_2';let items=JSON.parse(localStorage.getItem(K)||'null')||[{id:'1',en:"Hi, I'm here to install the shower door.",zh:'你好，我是来安装浴室门的。',category:'浴室门',favorite:true},{id:'2',en:'Are you paying today?',zh:'您今天付款吗？',category:'收款',favorite:false}];let list=[],idx=0,audio=null,playing=false,paused=false,shuffle=false;const $=x=>document.getElementById(x);const save=()=>localStorage.setItem(K,JSON.stringify(items));function cur(){const q=$('search').value.toLowerCase(),f=$('filter').value;return items.filter(x=>(!q||(x.en+' '+x.zh).toLowerCase().includes(q))&&(f==='all'||x.favorite))}function render(){const d=cur();$('count').textContent='共 '+d.length+' 句';$('list').innerHTML=d.map(x=>`<article class="card"><div class="en">${x.en}</div><div class="zh">${x.zh}</div><span class="tag">${x.category}</span><div class="row" style="margin-top:10px"><button class="primary" onclick="single('${x.id}')">▶ 真人发音</button><button onclick="fromHere('${x.id}')">🎧 从这里播放</button><button onclick="fav('${x.id}')">${x.favorite?'★ 已收藏':'☆ 收藏'}</button><button onclick="editItem('${x.id}')">编辑</button><button class="danger" onclick="del('${x.id}')">删除</button></div></article>`).join('')||'<div class="panel">没有句子</div>'}async function api(path,body){if(!API)throw Error('还没有设置Worker地址');const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw Error(await r.text());return r}async function speech(t){const r=await api('/speech',{text:t,voice:$('voice').value,speed:Number($('speed').value)});return URL.createObjectURL(await r.blob())}function stopAudio(){if(audio){audio.pause();audio.currentTime=0;audio=null}}function update(){const x=list[idx];$('now').textContent=x?x.en:'尚未播放';$('progress').textContent=list.length?(idx+1)+' / '+list.length:'0 / 0';$('pause').textContent=playing&&!paused?'⏸':'▶';if('mediaSession'in navigator&&x)navigator.mediaSession.metadata=new MediaMetadata({title:x.en,artist:x.zh||'小白学英语',album:x.category})}function zhSpeak(t){return new Promise(res=>{const u=new SpeechSynthesisUtterance(t);u.lang='zh-CN';u.rate=.9;u.onend=res;u.onerror=res;speechSynthesis.speak(u)})}async function playText(t){const url=await speech(t);await new Promise((res,rej)=>{audio=new Audio(url);audio.onended=res;audio.onerror=()=>rej(Error('播放失败'));audio.play().catch(rej)});URL.revokeObjectURL(url);audio=null}async function run(){playing=true;paused=false;update();while(playing&&list.length){const x=list[idx],n=Number($('repeat').value),lm=$('lang').value;for(let i=0;i<n&&playing;i++){if(lm==='zhEn'){if(x.zh)await zhSpeak(x.zh);if(!playing)break;await playText(x.en)}else{await playText(x.en);if(!playing)break;if(lm==='enZh'&&x.zh)await zhSpeak(x.zh)}}if(!playing)break;const m=$('mode').value;if(m==='singleLoop')continue;if(idx<list.length-1)idx++;else if(m==='listLoop')idx=0;else{playing=false;break}update()}update()}function build(){let d=$('scope').value==='favorite'?items.filter(x=>x.favorite):$('scope').value==='current'?cur():[...items];if(shuffle)d.sort(()=>Math.random()-.5);return d}function start(i=0){stopAudio();playing=false;list=build();if(!list.length)return alert('没有可以播放的句子');idx=Math.max(0,Math.min(i,list.length-1));run()}function single(id){list=[items.find(x=>x.id===id)];idx=0;stopAudio();playing=false;run()}function fromHere(id){list=build();const i=list.findIndex(x=>x.id===id);stopAudio();playing=false;idx=i<0?0:i;run()}function fav(id){const x=items.find(x=>x.id===id);x.favorite=!x.favorite;save();render()}function editItem(id){const x=items.find(x=>x.id===id);if(!x)return;const en=prompt('修改英文：',x.en);if(en===null)return;const zh=prompt('修改中文：',x.zh||'');if(zh===null)return;const category=prompt('修改分类：',x.category||'我的句子');if(category===null)return;x.en=en.trim()||x.en;x.zh=zh.trim();x.category=category.trim()||'我的句子';save();render()}function del(id){if(confirm('确定删除吗？')){items=items.filter(x=>x.id!==id);save();render()}}$('playAll').onclick=()=>{shuffle=false;start(0)};$('shuffle').onclick=()=>{shuffle=true;start(0)};$('prev').onclick=()=>{if(!list.length)return;idx=(idx-1+list.length)%list.length;stopAudio();if(playing)run();else update()};$('next').onclick=()=>{if(!list.length)return;idx=(idx+1)%list.length;stopAudio();if(playing)run();else update()};$('stop').onclick=()=>{playing=false;paused=false;stopAudio();update()};$('pause').onclick=()=>{if(!playing){if(list.length)run();else start(0);return}if(audio){if(!paused){audio.pause();paused=true}else{audio.play();paused=false}update()}};$('preview').onclick=()=>{const t=$('en').value.trim();if(t)singleTemp(t)};async function singleTemp(t){try{const u=await speech(t);audio=new Audio(u);audio.play()}catch(e){alert(e.message)}}$('en2zh').onclick=()=>trans('en-zh');$('zh2en').onclick=()=>trans('zh-en');async function trans(d){const src=d==='zh-en'?$('zh').value.trim():$('en').value.trim();if(!src)return alert('请先输入内容');try{const r=await api('/translate',{text:src,direction:d}),j=await r.json();if(d==='zh-en')$('en').value=j.translation;else $('zh').value=j.translation}catch(e){alert('翻译失败：'+e.message)}}$('save').onclick=()=>{const en=$('en').value.trim();if(!en)return alert('请输入英文');items.unshift({id:Date.now().toString(36),en,zh:$('zh').value.trim(),category:$('cat').value,favorite:false});save();render();$('en').value='';$('zh').value=''};$('clear').onclick=()=>{$('en').value='';$('zh').value=''};$('paste').onclick=async()=>{try{const t=await navigator.clipboard.readText(),ls=t.split(/
?
/).map(x=>x.trim()).filter(Boolean);let en='',zh='',cat='我的句子';for(const l of ls){if(/^英文[:：]/.test(l))en=l.replace(/^英文[:：]\s*/,'');else if(/^中文[:：]/.test(l))zh=l.replace(/^中文[:：]\s*/,'');else if(/^分类[:：]/.test(l))cat=l.replace(/^分类[:：]\s*/,'')}if(!en)en=ls[0]||'';if(!zh)zh=ls[1]||'';$('en').value=en;$('zh').value=zh;[...$('cat').options].some(o=>o.value===cat)&&($('cat').value=cat)}catch{alert('无法读取剪贴板')}};$('search').oninput=render;$('filter').onchange=render;if('mediaSession'in navigator){navigator.mediaSession.setActionHandler('play',()=>$('pause').click());navigator.mediaSession.setActionHandler('pause',()=>$('pause').click());navigator.mediaSession.setActionHandler('previoustrack',()=>$('prev').click());navigator.mediaSession.setActionHandler('nexttrack',()=>$('next').click());navigator.mediaSession.setActionHandler('stop',()=>$('stop').click())}async function check(){const b=$('status');if(!API){b.className='status bad';b.textContent='还没有设置Worker地址';return}try{const r=await fetch(API+'/health');if(!r.ok)throw 0;b.className='status ok';b.textContent='真人语音服务已连接'}catch{b.className='status bad';b.textContent='真人语音后台暂时连接不上'}}render();check();update();if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js');
</script></body></html>
